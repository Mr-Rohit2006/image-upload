<!doctype html>
<html>
  <head>
    <title>Upload Image</title>
  </head>

  <body>
    <h2>Upload Image</h2>

    <form
      action="/upload"
      method="post"
      enctype="multipart/form-data"
    >
      <input type="file" name="image" />
      <br /><br />

      <button type="submit">Upload</button>
    </form>
  </body>
</html>
